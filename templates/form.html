{% extends "base.html" %}

{% block content %}

<form method="POST">

    <input type="text" name="nombre" placeholder="Nombre"
        value="{{ producto.nombre if producto else '' }}" class="form-control mb-2">

    <input type="text" name="categoria" placeholder="Categoría"
        value="{{ producto.categoria if producto else '' }}" class="form-control mb-2">

    <input type="number" step="0.01" name="precio" placeholder="Precio"
        value="{{ producto.precio if producto else '' }}" class="form-control mb-2">

    <input type="number" name="stock" placeholder="Stock"
        value="{{ producto.stock if producto else '' }}" class="form-control mb-2">

    <button class="btn btn-success">Guardar</button>

</form>

{% endblock %}
